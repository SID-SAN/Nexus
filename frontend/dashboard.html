<!DOCTYPE html>

<html>
<head>
  <title>Nexus Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white">

<div class="flex h-screen">

  <!-- Sidebar -->

  <div class="w-64 bg-slate-800 p-5">
    <h1 class="text-xl font-bold text-indigo-400 mb-6">⚡ Nexus</h1>
    <div class="space-y-3 text-slate-300">
      <div>Dashboard</div>
      <div>Jobs</div>
      <div>Nodes</div>
    </div>
    <div class="mt-10">
      <p class="text-xs text-slate-400">Credits</p>
      <p id="credits" class="text-xl text-indigo-400">-</p>
    </div>
  </div>

  <!-- Main -->

  <div class="flex-1 p-6 overflow-auto">

<!-- Top -->
<div class="flex justify-between items-center mb-6">

  <h2 class="text-lg font-semibold">Cluster Dashboard</h2>

  <div class="flex gap-2">

    <button onclick="showLogin()"
      class="bg-slate-700 px-4 py-2 rounded hover:bg-slate-600">
      Login
    </button>

    <button onclick="toggleSubmit()"
      class="bg-indigo-500 px-4 py-2 rounded hover:bg-indigo-600">
      + Submit Job
    </button>

  </div>
</div>

<div id="loginPanel"
  style="display:none;"
  class="bg-slate-800 p-4 rounded mb-6">

  <input type="text" id="email" placeholder="Email"
    class="mb-2 w-full text-black">

  <input type="password" id="password" placeholder="Password"
    class="mb-2 w-full text-black">

  <button onclick="login()"
    class="bg-blue-500 px-4 py-2 rounded w-full mb-2">
    Login
  </button>

  <button onclick="createUser()"
    class="bg-slate-700 px-4 py-2 rounded w-full">
    Create User
  </button>

  <p id="loginStatus"></p>
</div>

<!-- Submit Panel -->
<div id="submitPanel" style="display:none;" class="bg-slate-800 p-4 rounded mb-6">    
  <input type="file" id="file" class="mb-2 text-black">
  <input type="number" id="chunks" placeholder="Chunks"
    class="mb-2 w-full text-black">
  <select id="reducer" class="mb-2 w-full text-black">
    <option value="sum">sum</option>
    <option value="avg">avg</option>
    <option value="max">max</option>
    <option value="min">min</option>
    <option value="list">list</option>
  </select>
  <button onclick="submitJob()" class="bg-green-500 px-4 py-2 rounded w-full">
    Submit
  </button>
  <p id="submitStatus"></p>
</div>

<!-- Stats -->
<div class="grid grid-cols-4 gap-4 mb-6">
  <div class="bg-slate-800 p-4 rounded">
    Nodes: <span id="nodeCount">0</span>
  </div>
  <div class="bg-slate-800 p-4 rounded">
    Jobs: <span id="jobCount">0</span>
  </div>
  <div class="bg-slate-800 p-4 rounded">
    Running: <span id="runningCount">0</span>
  </div>
  <div class="bg-slate-800 p-4 rounded">
    Speed: <span id="avgSpeed">0</span>
  </div>
</div>

<!-- Nodes -->
<h3 class="mb-2">Nodes</h3>
<div id="nodes" class="grid grid-cols-3 gap-4 mb-6"></div>

<!-- Jobs -->
<h3 class="mb-2">Jobs</h3>
<div class="bg-slate-800 rounded">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-t border-slate-700 hover:bg-slate-800 transition"">
        <th class="p-2">ID</th>
        <th>Status</th>
        <th>Progress</th>
        <th>Duration</th>
        <th>Speed</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="jobBody"></tbody>
  </table>
</div>

  </div>
</div>

<!-- Logs -->

<div id="logPanel"
  class="hidden fixed right-0 top-0 w-96 h-full bg-black p-4 overflow-auto">

  <button onclick="closeLogs()" class="bg-red-500 px-3 py-1 mb-3">
    Close
  </button>

  <div id="logContent"></div>
</div>

<script>

const BASE_URL = window.location.origin;
let logInterval;

function showLogin() {
  const login = document.getElementById("loginPanel");
  const submit = document.getElementById("submitPanel");

  submit.style.display = "none";

  login.style.display =
    login.style.display === "block" ? "none" : "block";
}

// 🚀 FETCH
async function fetchData() {

  const nodesRes = await fetch(BASE_URL + "/cluster_status");
  const jobsRes = await fetch(BASE_URL + "/all_jobs");

  const nodes = await nodesRes.json();
  const jobs = await jobsRes.json();

  updateNodes(nodes);
  updateJobs(jobs);
  updateStats(nodes, jobs);
}

async function fetchCredits() {

  const apiKey = localStorage.getItem("api_key");
  if (!apiKey) return;

  const res = await fetch(BASE_URL + `/user/${apiKey}`);
  const data = await res.json();

  document.getElementById("credits").innerText =
    data.credits ?? 0;
}

// Login
async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const form = new FormData();
  form.append("email", email);
  form.append("password", password);

  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  if (data.api_key) {
    localStorage.setItem("api_key", data.api_key);

    document.getElementById("loginStatus").innerText =
      "Logged in. API Key: " + data.api_key;

    // optional UX
    document.getElementById("loginPanel").style.display = "none";
  } else {
    document.getElementById("loginStatus").innerText =
      "Login failed";
  }
}

// Create User
async function createUser() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const form = new FormData();
  form.append("email", email);
  form.append("password", password);

  const res = await fetch(BASE_URL + "/create_user", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  document.getElementById("loginStatus").innerText =
    "New API Key: " + data.api_key;
}

// 🖥️ NODES
function updateNodes(nodes) {

  if (!nodes.connected_nodes || nodes.connected_nodes.length === 0) {
    document.getElementById("nodes").innerHTML = "<p class='text-slate-400'>No nodes connected</p>";
    return;
  }

  document.getElementById("nodes").innerHTML =
    nodes.connected_nodes.map(n => `
      <div class="bg-slate-800 p-3 rounded">🟢 ${n}</div>
    `).join("");
}

// 📦 JOBS
function updateJobs(jobs) {

  if (!jobs || Object.keys(jobs).length === 0) {
    document.getElementById("jobBody").innerHTML =
      "<tr><td colspan='6'>No jobs</td></tr>";
    return;
  }

  document.getElementById("jobBody").innerHTML =
    Object.entries(jobs).map(([id, j]) => {

      let pct = j.total ? Math.round((j.completed / j.total) * 100) : 0;

      return `
      <tr class="border-t border-slate-700">
        <td class="p-2">${id.slice(0,8)}</td>
        <td>${j.status}</td>
        <td>
          <div class="bg-slate-700 h-2 w-20 inline-block">
            <div class="bg-indigo-400 h-2" style="width:${pct}%"></div>
          </div>
          ${j.completed}/${j.total}
        </td>
        <td>${j.duration}s</td>
        <td>${j.speed}</td>
        <td>
          <button onclick="viewLogs('${id}')">Logs</button>
          ${j.status === "running"
            ? `<button onclick="cancelJob('${id}')">Cancel</button>` : ""}
        </td>
      </tr>
      `;
    }).join("");
}

// 📊 STATS
function updateStats(nodes, jobs) {

  document.getElementById("nodeCount").innerText =
    (nodes.connected_nodes || []).length;

  document.getElementById("jobCount").innerText =
    Object.keys(jobs || {}).length;

  let running = 0;
  let speed = 0;

  Object.values(jobs || {}).forEach(j => {
    if (j.status === "running") running++;
    speed += j.speed || 0;
  });

  document.getElementById("runningCount").innerText = running;
  document.getElementById("avgSpeed").innerText =
    (speed / (Object.keys(jobs || {}).length || 1)).toFixed(2);
}

// ❌ CANCEL
async function cancelJob(id) {
  await fetch(BASE_URL + `/cancel_job/${id}`, { method: "POST" });
}

// 📜 LOGS
function viewLogs(id) {

  document.getElementById("logPanel").classList.remove("hidden");
  const panel = document.getElementById("logPanel");
  panel.scrollTop = panel.scrollHeight;

  if (logInterval) clearInterval(logInterval);

  async function load() {

    const res = await fetch(BASE_URL + `/job_logs/${id}`);
    const data = await res.json();

    let html = "";

    const logs = data.logs || data;

    for (let c in logs) {
    html += `
    <pre style="
        background:#020617;
        padding:10px;
        border-radius:6px;
        color:#38bdf8;
        font-size:12px;
        margin-bottom:6px;
    ">${logs[c]}</pre>
    `;
    }

    if (!html) {
    html = "<p class='text-slate-400'>No logs yet...</p>";
    }

    document.getElementById("logContent").innerHTML = html;

  load();
  logInterval = setInterval(load, 1000);
}


function closeLogs() {
document.getElementById("logPanel").classList.add("hidden");
clearInterval(logInterval);
}

// 🚀 SUBMIT
async function submitJob() {

const file = document.getElementById("file").files[0];
const chunks = document.getElementById("chunks").value;
const reducer = document.getElementById("reducer").value;

const apiKey = localStorage.getItem("api_key");
if (!apiKey) return alert("Login first");

const form = new FormData();
form.append("file", file);
form.append("chunks", chunks);
form.append("reducer", reducer);
form.append("api_key", apiKey);
form.append("price", 100);

const res = await fetch(BASE_URL + "/submit_job", {
method: "POST",
body: form
});

const data = await res.json();

document.getElementById("submitStatus").innerText =
"Submitted: " + data.job_id;
}

// UI
function toggleSubmit() {
  const submit = document.getElementById("submitPanel");
  const login = document.getElementById("loginPanel");

  login.style.display = "none";

  submit.style.display =
    submit.style.display === "block" ? "none" : "block";
}

// 🔁 AUTO REFRESH
setInterval(fetchData, 3000);
fetchData();
setInterval(fetchCredits, 5000);
fetchCredits();

</script>

</body>
</html>
